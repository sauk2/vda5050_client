name: Build and test the VDA5050 library

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  industrial_ci:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        env:
          - ICI_JOB_NAME: gcc
            ROS_DISTRO: jazzy
            UPSTREAM_WORKSPACE: 'github:ros-industrial/vda5050_interfaces#throwaway/remove-serde'
            TARGET_CMAKE_ARGS: '-DENABLE_ROS2=ON'
          - ICI_JOB_NAME: clang
            ROS_DISTRO: jazzy
            UPSTREAM_WORKSPACE: 'github:ros-industrial/vda5050_interfaces#throwaway/remove-serde'
            ADDITIONAL_DEBS: clang lld
            CC: "clang"
            CXX: "clang++"
            TARGET_CMAKE_ARGS: '-DENABLE_ROS2=ON'
    env:
      ISOLATION: "shell"
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-core
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update -qq -y
          apt-get install libpaho-mqtt-dev libpaho-mqttpp-dev libfmt-dev -qq -y
          apt-get install ros-jazzy-behaviortree-cpp -qq -y
      - uses: 'ros-industrial/industrial_ci@master'
        env: ${{ matrix.env }}
